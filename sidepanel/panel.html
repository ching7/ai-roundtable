<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 圆桌</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <span class="logo-mark" aria-hidden="true">✳</span>
      <h1>AI 圆桌</h1>
    </header>

    <p class="greeting" id="greeting">有什么可以帮你的?</p>

    <!-- Composer -->
    <section class="composer" id="composer">
      <textarea
        id="message-input"
        class="composer-input"
        placeholder="输入消息…"
        rows="3"
      ></textarea>

      <!-- Cross-reference row (shown only in 交叉引用 mode) -->
      <div class="cross-row hidden" id="cross-row">
        <span class="cross-text">让所选对象评价</span>
        <div class="dropdown" id="dd-source" data-type="single">
          <button type="button" class="dropdown-trigger" aria-haspopup="true" aria-expanded="false">
            <span class="dropdown-label">来源</span>
            <svg class="caret" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="dropdown-menu" role="menu"></div>
        </div>
        <span class="cross-text">的回复</span>
      </div>

      <!-- File chips -->
      <div id="file-list" class="file-list"></div>

      <!-- Bottom bar -->
      <div class="composer-bar">
        <input type="file" id="file-input" multiple hidden accept="image/*,.pdf,.txt,.md,.json,.csv,.xml,.html,.css,.js,.ts,.py">
        <button type="button" id="add-file-btn" class="icon-btn" title="添加文件" aria-label="添加文件">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>

        <!-- 对象 (multi-select targets) -->
        <div class="dropdown" id="dd-target" data-type="multi">
          <button type="button" class="dropdown-trigger" aria-haspopup="true" aria-expanded="false" title="发送对象">
            <span class="dropdown-label">全部</span>
            <svg class="caret" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="dropdown-menu" role="menu"></div>
        </div>

        <!-- 模式 -->
        <div class="dropdown" id="dd-mode" data-type="single">
          <button type="button" class="dropdown-trigger" aria-haspopup="true" aria-expanded="false" title="模式">
            <span class="dropdown-label">普通发送</span>
            <svg class="caret" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="dropdown-menu" role="menu"></div>
        </div>

        <!-- 动作 (shown only in 互评 / 交叉引用) -->
        <div class="dropdown hidden" id="dd-action" data-type="single">
          <button type="button" class="dropdown-trigger" aria-haspopup="true" aria-expanded="false" title="动作">
            <span class="dropdown-label">动作</span>
            <svg class="caret" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="dropdown-menu" role="menu"></div>
        </div>

        <button id="send-btn" class="send-btn" title="发送" aria-label="发送">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        </button>
      </div>
    </section>

    <!-- Discussion control panel (shown only while a discussion is active) -->
    <section class="discussion-panel hidden" id="discussion-panel">
      <div class="discussion-header">
        <div class="discussion-info">
          <span class="round-badge" id="round-badge">第 1 轮</span>
          <span class="participants-badge" id="participants-badge">Claude vs ChatGPT</span>
        </div>
        <button class="end-btn" id="end-discussion-btn" title="结束讨论">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>
          结束
        </button>
      </div>
      <div class="discussion-topic-display" id="topic-display"></div>
      <div class="discussion-status" id="discussion-status">等待初始回复...</div>

      <div class="discussion-interject">
        <label for="interject-input">插话(同步发送给讨论双方)</label>
        <textarea id="interject-input" placeholder="输入你想对双方说的话..."></textarea>
        <div class="interject-actions">
          <button id="interject-btn" class="ghost-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
            发送给双方
          </button>
        </div>
      </div>

      <div class="discussion-controls">
        <button id="next-round-btn" class="primary-btn" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
          下一轮
        </button>
        <button id="generate-summary-btn" class="ghost-btn" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          生成总结
        </button>
      </div>
    </section>

    <!-- Discussion summary (shown after 生成总结) -->
    <section class="discussion-summary hidden" id="discussion-summary">
      <h3>讨论总结</h3>
      <div id="summary-content"></div>
      <button id="new-discussion-btn" class="primary-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新讨论
      </button>
    </section>

    <!-- Usage help -->
    <details class="help">
      <summary>用法说明</summary>
      <ul>
        <li><strong>普通发送</strong> — 选好「对象」后直接发送;也支持手打 <code>@Claude</code>、<code>/mutual</code>、<code>/cross</code> 命令。</li>
        <li><strong>互评</strong> — 选 ≥2 个对象,各方互相评价当前回复;可加自定义提示或选「动作」。</li>
        <li><strong>交叉引用</strong> — 选「对象」(评价方)与「来源」,让对象评价来源 AI 的回复。</li>
        <li><strong>讨论</strong> — 选正好 2 位对象,输入主题开始多轮辩论。</li>
      </ul>
    </details>

    <!-- Activity log -->
    <section class="log">
      <h3>活动日志</h3>
      <div id="log-container"></div>
    </section>
  </div>

  <script src="panel.js"></script>
</body>
</html>
